name: RetroDex JavaFX CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile JavaFX app
        run: ./gradlew :retrodex-javafx:classes :retrodex-javafx:installDist

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests and verify JaCoCo coverage
        run: ./gradlew :retrodex-javafx:test :retrodex-javafx:jacocoTestReport :retrodex-javafx:jacocoTestCoverageVerification

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-javafx-report
          path: retrodex-javafx/build/reports/jacoco/test/html

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install headless UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libxrender1 libxtst6 libxi6

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run TestFX E2E tests in headless mode
        run: xvfb-run -a ./gradlew :retrodex-javafx:e2eTest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ build, test, e2e ]
    if: ${{ success() }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build distributable ZIP
        run: ./gradlew :retrodex-javafx:distZip

      - name: Prepare static hosting artifact
        run: |
          mkdir -p pages/downloads
          cp retrodex-javafx/build/distributions/retrodex-javafx-1.0.0.zip pages/downloads/retrodex-javafx-1.0.0.zip
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="utf-8">
              <title>RetroDex JavaFX</title>
            </head>
            <body>
              <h1>RetroDex JavaFX</h1>
              <p>Build desplegada automaticamente tras superar Build, Test y E2E.</p>
              <a href="./downloads/retrodex-javafx-1.0.0.zip">Descargar aplicacion</a>
            </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
